<!DOCTYPE html>
<html>
<head>
    <title>Beginner Coding Platform</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f6f8;
        }

        textarea {
            width: 100%;
            height: 250px;
            padding: 12px;
            font-family: monospace;
            font-size: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            margin-right: 10px;
            font-size: 15px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .run-btn {
            background-color: #007bff;
            color: white;
        }

        .clear-btn {
            background-color: #6c757d;
            color: white;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-top: 15px;
        }

        .error-line {
            color: red;
            font-weight: bold;
        }

        .success-title {
            color: green;
            font-weight: bold;
        }

        pre {
            background: black;
            color: #00ff00;
            padding: 10px;
            border-radius: 6px;
        }

    </style>

</head>

<body>

<h1>🚀 Beginner Coding Platform</h1>

<textarea id="code" placeholder="Example:

print('hello')

Try error:
print(hello)

"></textarea>

<br>

<button class="run-btn" onclick="runCode()">Run Code</button>
<button class="clear-btn" onclick="clearCode()">Clear</button>

<div id="result"></div>

<script>

async function runCode() {

    const code = document.getElementById("code").value;

    if (!code.trim()) {
        alert("Please write code");
        return;
    }

    const response = await fetch("/run", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({ code: code })

    });

    const data = await response.json();

    let output = "";

    // SUCCESS CASE

    if (data.execution.success) {

        output += `
        <div class="card">

            <div class="success-title">
                Program ran successfully
            </div>

            <pre>${data.execution.output}</pre>

        </div>
        `;
    }

    // ERROR CASE

    if (!data.execution.success) {

        const lines = code.split("\n");

        output += `
        <div class="card">
            <strong>Error in line ${data.execution.error_line}</strong>
        </div>
        `;

        output += `<div class="card"><pre>`;

        lines.forEach((line, index) => {

            if (index + 1 === data.execution.error_line) {

                output += `<span class="error-line">${index+1}: ${line}</span>\n`;

                output += `<span class="error-line">   ^ Error here</span>\n`;

            } else {

                output += `${index+1}: ${line}\n`;

            }

        });

        output += `</pre></div>`;

        output += `
        <div class="card">

            <strong>Error Type:</strong><br>
            ${data.execution.error_type}

            <br><br>

            <strong>Error Message:</strong><br>
            ${data.execution.error_message}

        </div>
        `;

        output += `
        <div class="card">

            <strong>Explanation:</strong><br>
            ${data.explanation.explanation}

        </div>
        `;

        output += `
        <div class="card">

            <strong>How to Fix:</strong><br>
            ${data.explanation.fix}

        </div>
        `;
    }

    document.getElementById("result").innerHTML = output;

}


function clearCode() {

    document.getElementById("code").value = "";

    document.getElementById("result").innerHTML = "";

}

</script>

</body>
</html>
