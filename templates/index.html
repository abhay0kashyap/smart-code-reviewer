<!DOCTYPE html>
<html>
<head>
    <title>Beginner Coding Platform - Smart Reviewer</title>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f4f6f8;
        }

        h1 {
            color: #333;
        }

        textarea {
            width: 100%;
            height: 220px;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 12px 25px;
            margin-top: 12px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #result {
            margin-top: 25px;
            padding: 15px;
            background: white;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        .error {
            color: red;
            font-weight: bold;
        }

        .success {
            color: green;
            font-weight: bold;
        }

        .box {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            background: #f9f9f9;
            border: 1px solid #ddd;
        }

        pre {
            background: black;
            color: #00ff00;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
        }
    </style>
</head>

<body>

<h1>🚀 Beginner Coding Platform with Smart Error Guide</h1>

<p>
Write your Python code below and click <b>Run Code</b>.  
You will see:
</p>

<ul>
    <li>Program Output</li>
    <li>Error explanation (beginner friendly)</li>
    <li>Code quality issues</li>
    <li>Code quality score</li>
</ul>

<textarea id="code" placeholder="Example:
print('Hello World')

or try error:
print(x)
"></textarea>

<br>

<button onclick="runCode()">Run Code</button>

<div id="result"></div>

<script>

async function runCode() {

    const code = document.getElementById("code").value;

    const response = await fetch("/run", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ code: code })
    });

    const data = await response.json();

    let output = "<h2>Result</h2>";

    // Execution Output
    if (data.execution.success && data.execution.output) {
        output += `
        <div class="box">
        <h3 class="success">Program Output:</h3>
        <pre>${data.execution.output}</pre>
        </div>
        `;
    }

    // Error Explanation
    if (data.execution.error) {
        output += `
        <div class="box">
        <h3 class="error">Error Detected</h3>
        <p><b>Error Type:</b> ${data.explanation.type}</p>
        <p><b>Explanation:</b> ${data.explanation.explanation}</p>
        <p><b>How to fix:</b> ${data.explanation.fix}</p>
        </div>
        `;
    }

    // Analysis Score
    output += `
    <div class="box">
    <h3>Code Quality Score: ${data.analysis.score}/100</h3>
    </div>
    `;

    // Issues List
    if (data.analysis.issues.length > 0) {

        output += "<div class='box'><h3>Code Issues:</h3>";

        data.analysis.issues.forEach(issue => {

            output += `
            <p class="error">
            Line ${issue.line}: ${issue.message}
            </p>
            `;

        });

        output += "</div>";

    } else {

        output += `
        <div class="box">
        <p class="success">No code quality issues found.</p>
        </div>
        `;
    }

    document.getElementById("result").innerHTML = output;
}

</script>

</body>
</html>
