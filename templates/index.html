<!DOCTYPE html>
<html>
<head>
    <title>Smart Code Reviewer</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        textarea { width: 100%; height: 200px; }
        button { padding: 10px 20px; margin-top: 10px; }
        #result { margin-top: 20px; }
        .error { color: red; }
    </style>
</head>
<body>

<h1>Smart Code Reviewer 🚀</h1>

<textarea id="code" placeholder="Paste your Python code here..."></textarea>
<br>
<button onclick="analyzeCode()">Analyze Code</button>

<div id="result"></div>

<script>
async function analyzeCode() {
    const code = document.getElementById("code").value;

    const response = await fetch("/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ code: code })
    });

    const data = await response.json();

    let output = "<h2>Result:</h2>";
    output += "<p>Status: " + data.status + "</p>";
    output += "<p>Message: " + data.message + "</p>";

    if (data.issues.length > 0) {
        output += "<h3>Issues:</h3>";
        data.issues.forEach(issue => {
            output += "<p class='error'>Line " + issue.line + ": " + issue.message + "</p>";
        });
    } else {
        output += "<p>No issues found 🎉</p>";
    }

    document.getElementById("result").innerHTML = output;
}
</script>

</body>
</html>
