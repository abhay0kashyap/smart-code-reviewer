<!DOCTYPE html>
<html>
<head>
    <title>Beginner Coding Platform</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f6f8;
        }

        h1 {
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 250px;
            padding: 12px;
            font-family: monospace;
            font-size: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            resize: vertical;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            margin-right: 10px;
            font-size: 15px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .run-btn {
            background-color: #007bff;
            color: white;
        }

        .clear-btn {
            background-color: #6c757d;
            color: white;
        }

        button:hover {
            opacity: 0.9;
        }

        #result {
            margin-top: 25px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-top: 15px;
        }

        .error-title {
            color: #c0392b;
            font-weight: bold;
        }

        .success-title {
            color: #27ae60;
            font-weight: bold;
        }

        pre {
            background: #000;
            color: #00ff00;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
        }

        ul {
            padding-left: 20px;
        }

    </style>
</head>

<body>

<h1>🚀 Beginner Coding Platform with Smart Error Guide</h1>

<p>
Write your Python code and click <b>Run Code</b>.  
You’ll get:
</p>

<ul>
    <li>Program output</li>
    <li>Exact Python error</li>
    <li>Beginner-friendly explanation</li>
    <li>Step-by-step fix guidance</li>
    <li>Code quality score</li>
</ul>

<textarea id="code" placeholder="Example:
print('Hello World')

Try an error:
print(x)
"></textarea>

<br>

<button class="run-btn" onclick="runCode()">Run Code</button>
<button class="clear-btn" onclick="clearCode()">Clear</button>

<div id="result"></div>

<script>

async function runCode() {

    const code = document.getElementById("code").value;

    if (!code.trim()) {
        alert("Please write some Python code first.");
        return;
    }

    const response = await fetch("/run", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ code: code })
    });

    const data = await response.json();

    let output = "";

    // =============================
    // SUCCESS OUTPUT
    // =============================
    if (data.execution.success) {

        output += `
        <div class="card">
            <div class="success-title">Program Executed Successfully ✅</div>
            <pre>${data.execution.output || "No output produced."}</pre>
        </div>
        `;
    }

    // =============================
    // ERROR SECTION
    // =============================
    if (data.execution.error) {

        output += `
        <div class="card">
            <div class="error-title">Actual Python Error:</div>
            <pre>${data.execution.error}</pre>
        </div>
        `;

        if (data.explanation) {

            output += `
            <div class="card">
                <strong>What Happened?</strong>
                <p>${data.explanation.explanation}</p>
            </div>
            `;

            if (data.explanation.fix_steps) {

                output += `
                <div class="card">
                    <strong>How To Fix It:</strong>
                    <ul>
                `;

                data.explanation.fix_steps.forEach(step => {
                    output += `<li>${step}</li>`;
                });

                output += `
                    </ul>
                </div>
                `;
            }
        }
    }

    // =============================
    // CODE QUALITY SCORE
    // =============================
    if (data.analysis && data.analysis.score !== undefined) {
        output += `
        <div class="card">
            <strong>Code Quality Score:</strong> ${data.analysis.score}/100
        </div>
        `;
    }

    // =============================
    // CODE ISSUES
    // =============================
    if (data.analysis && data.analysis.issues && data.analysis.issues.length > 0) {

        output += `
        <div class="card">
            <strong>Code Quality Issues:</strong>
            <ul>
        `;

        data.analysis.issues.forEach(issue => {
            output += `<li>Line ${issue.line}: ${issue.message}</li>`;
        });

        output += `
            </ul>
        </div>
        `;
    }

    document.getElementById("result").innerHTML = output;
}


// CLEAR FUNCTION
function clearCode() {
    document.getElementById("code").value = "";
    document.getElementById("result").innerHTML = "";
}

</script>

</body>
</html>
